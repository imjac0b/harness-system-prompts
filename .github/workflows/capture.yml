name: Capture harness system prompts

on:
  push:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: write

concurrency:
  group: capture-harness-system-prompts
  cancel-in-progress: false

jobs:
  capture-cli:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      claude_code_version: ${{ steps.versions.outputs.claude_code }}
      cline_cli_version: ${{ steps.versions.outputs.cline_cli }}
      cline_sdk_version: ${{ steps.versions.outputs.cline_sdk }}
      codex_version: ${{ steps.versions.outputs.codex }}
      gemini_cli_version: ${{ steps.versions.outputs.gemini_cli }}
      grok_code_cli_version: ${{ steps.versions.outputs.grok_code_cli }}
      hermes_agent_version: ${{ steps.versions.outputs.hermes_agent }}
      kilo_code_cli_version: ${{ steps.versions.outputs.kilo_code_cli }}
      kimi_cli_version: ${{ steps.versions.outputs.kimi_cli }}
      opencode_version: ${{ steps.versions.outputs.opencode }}
      openclaw_version: ${{ steps.versions.outputs.openclaw }}
      pi_version: ${{ steps.versions.outputs.pi }}
      qwen_code_version: ${{ steps.versions.outputs.qwen_code }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: astral-sh/setup-uv@v6

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Install harnesses
        run: |
          bun add --global \
            @anthropic-ai/claude-code@latest \
            @earendil-works/pi-coding-agent@latest \
            @google/gemini-cli@latest \
            @kilocode/cli@latest \
            @openai/codex@latest \
            @qwen-code/qwen-code@latest \
            @xai-official/grok@latest \
            cline@latest \
            openclaw@latest \
            opencode-ai@latest
          uv tool install --python 3.13 kimi-cli
          uv tool install --python 3.13 hermes-agent
          mkdir -p "$RUNNER_TEMP/cline-sdk-runner"
          cp scripts/capture-cline-sdk.ts "$RUNNER_TEMP/cline-sdk-runner/"
          cd "$RUNNER_TEMP/cline-sdk-runner"
          bun init -y
          bun add @cline/sdk@latest

      - name: Start local capture APIs
        run: |
          bun run capture-api > "$RUNNER_TEMP/capture-api.log" 2>&1 &
          echo "CAPTURE_API_PID=$!" >> "$GITHUB_ENV"
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:8787/health && exit 0
            sleep 0.25
          done
          cat "$RUNNER_TEMP/capture-api.log"
          exit 1

      - name: Create clean harness sandbox
        run: |
          mkdir -p "$RUNNER_TEMP/harness-sandbox"
          git -C "$RUNNER_TEMP/harness-sandbox" init --initial-branch=main
          git -C "$RUNNER_TEMP/harness-sandbox" config user.name "Harness Capture"
          git -C "$RUNNER_TEMP/harness-sandbox" config user.email "harness-capture@localhost"

      - name: Capture Codex instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          CAPTURE_API_KEY: local-capture-only
          CODEX_HOME: ${{ runner.temp }}/codex-home
        run: |
          mkdir -p "$CODEX_HOME"
          codex exec --ephemeral --skip-git-repo-check \
            -c 'model="capture-model"' \
            -c 'model_provider="capture"' \
            -c 'model_reasoning_effort="low"' \
            -c 'model_providers.capture.name="Local capture API"' \
            -c 'model_providers.capture.base_url="http://127.0.0.1:8787/v1"' \
            -c 'model_providers.capture.env_key="CAPTURE_API_KEY"' \
            -c 'model_providers.capture.wire_api="responses"' \
            "Reply with the word captured."

      - name: Capture Claude Code instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          ANTHROPIC_AUTH_TOKEN: local-capture-only
          ANTHROPIC_BASE_URL: http://127.0.0.1:8787
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"
        run: claude --print "Reply with the word captured." --model capture-model --max-turns 1 --no-session-persistence

      - name: Capture Gemini CLI instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          GEMINI_API_KEY: local-capture-only
          GEMINI_CLI_TRUST_WORKSPACE: "true"
          GEMINI_TELEMETRY_ENABLED: "false"
          GOOGLE_GEMINI_BASE_URL: http://127.0.0.1:8787
          HOME: ${{ runner.temp }}/gemini-home
        run: |
          mkdir -p "$HOME/.gemini"
          printf '%s\n' '{"security":{"auth":{"selectedType":"gemini-api-key"}}}' > "$HOME/.gemini/settings.json"
          gemini -p "Reply with the word captured." --model capture-gemini --output-format json

      - name: Capture OpenCode instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          CAPTURE_API_KEY: local-capture-only
          OPENCODE_CONFIG: ${{ runner.temp }}/opencode.json
          OPENCODE_DISABLE_AUTOUPDATE: "true"
          OPENCODE_DISABLE_MODELS_FETCH: "true"
          XDG_CONFIG_HOME: ${{ runner.temp }}/opencode-config
          XDG_DATA_HOME: ${{ runner.temp }}/opencode-data
        run: |
          printf '%s\n' '{"provider":{"capture":{"npm":"@ai-sdk/openai-compatible","name":"Local capture API","options":{"baseURL":"http://127.0.0.1:8787/v1","apiKey":"{env:CAPTURE_API_KEY}"},"models":{"capture-opencode":{"name":"Capture OpenCode"}}}}}' > "$OPENCODE_CONFIG"
          opencode run --model capture/capture-opencode "Reply with the word captured."

      - name: Capture Kimi CLI instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          KIMI_CLI_NO_AUTO_UPDATE: "1"
        run: |
          kimi --config '{"default_model":"capture-kimi","telemetry":false,"providers":{"capture":{"type":"openai_legacy","base_url":"http://127.0.0.1:8787/v1","api_key":"local-capture-only"}},"models":{"capture-kimi":{"provider":"capture","model":"capture-kimi","max_context_size":128000}}}' \
            --quiet -p "Reply with the word captured."

      - name: Capture Qwen Code instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          CAPTURE_API_KEY: local-capture-only
          QWEN_HOME: ${{ runner.temp }}/qwen-home
        run: |
          mkdir -p "$QWEN_HOME"
          printf '%s\n' '{"general":{"enableAutoUpdate":false},"modelProviders":{"openai":[{"id":"capture-qwen","name":"Capture Qwen","envKey":"CAPTURE_API_KEY","baseUrl":"http://127.0.0.1:8787/v1"}]},"security":{"auth":{"selectedType":"openai"}},"model":{"name":"capture-qwen"}}' > "$QWEN_HOME/settings.json"
          qwen -p "Reply with the word captured." --model capture-qwen --output-format json

      - name: Capture Grok Code CLI instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          HOME: ${{ runner.temp }}/grok-home
          XAI_API_KEY: local-capture-only
        run: |
          mkdir -p "$HOME/.grok"
          printf '%s\n' '[model.capture]' 'model = "capture-grok"' 'base_url = "http://127.0.0.1:8787/v1"' 'name = "Local capture API"' 'env_key = "XAI_API_KEY"' '' '[models]' 'default = "capture"' > "$HOME/.grok/config.toml"
          grok -p "Reply with the word captured." --model capture --output-format streaming-json

      - name: Capture Pi instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          HOME: ${{ runner.temp }}/pi-home
        run: |
          mkdir -p "$HOME/.pi/agent"
          printf '%s\n' '{"providers":{"capture":{"baseUrl":"http://127.0.0.1:8787/v1","api":"openai-completions","apiKey":"local-capture-only","models":[{"id":"capture-pi","name":"Capture Pi"}]}}}' > "$HOME/.pi/agent/models.json"
          pi --provider capture --model capture-pi --no-session --print "Reply with the word captured."

      - name: Capture Kilo Code CLI instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          HOME: ${{ runner.temp }}/kilo-home
          KILO_CONFIG_CONTENT: >-
            {"provider":{"capture":{"npm":"@ai-sdk/openai-compatible","name":"Local capture API","options":{"baseURL":"http://127.0.0.1:8787/v1","apiKey":"local-capture-only"},"models":{"capture-kilo-code":{"name":"Capture Kilo Code","limit":{"context":128000,"output":4096}}}}},"model":"capture/capture-kilo-code"}
          KILO_DISABLE_AUTOUPDATE: "true"
          KILO_DISABLE_MODELS_FETCH: "true"
          XDG_CONFIG_HOME: ${{ runner.temp }}/kilo-config
          XDG_DATA_HOME: ${{ runner.temp }}/kilo-data
        run: kilo run --model capture/capture-kilo-code "Reply with the word captured."

      - name: Capture Cline CLI instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          CLINE_NO_AUTO_UPDATE: "1"
          CLINE_TELEMETRY_DISABLED: "1"
          HOME: ${{ runner.temp }}/cline-home
        run: |
          cline auth \
            --provider openai-compatible \
            --apikey local-capture-only \
            --modelid capture-cline-cli \
            --baseurl http://127.0.0.1:8787/v1 \
            --data-dir "$RUNNER_TEMP/cline-data"
          cline \
            --data-dir "$RUNNER_TEMP/cline-data" \
            --cwd "$RUNNER_TEMP/harness-sandbox" \
            --provider openai-compatible \
            --model capture-cline-cli \
            --key local-capture-only \
            --json \
            "Reply with the word captured."

      - name: Capture Cline SDK instructions
        working-directory: ${{ runner.temp }}/cline-sdk-runner
        env:
          CAPTURE_WORKSPACE: ${{ runner.temp }}/harness-sandbox
          CLINE_TELEMETRY_DISABLED: "1"
          OTEL_TELEMETRY_ENABLED: "false"
        run: bun run capture-cline-sdk.ts

      - name: Capture OpenClaw instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          CAPTURE_WORKSPACE: ${{ runner.temp }}/harness-sandbox
          HOME: ${{ runner.temp }}/openclaw-home
          OPENCLAW_CONFIG_PATH: ${{ runner.temp }}/openclaw-state/openclaw.json
          OPENCLAW_STATE_DIR: ${{ runner.temp }}/openclaw-state
          OPENCLAW_TELEMETRY: "off"
        run: |
          mkdir -p "$OPENCLAW_STATE_DIR"
          node -e 'const fs=require("node:fs"); const config={update:{checkOnStart:false},diagnostics:{enabled:false},gateway:{mode:"local"},agents:{defaults:{workspace:process.env.CAPTURE_WORKSPACE,skipBootstrap:true,model:{primary:"capture/capture-openclaw"}}},models:{mode:"merge",providers:{capture:{baseUrl:"http://127.0.0.1:8787/v1",apiKey:"local-capture-only",api:"openai-completions",models:[{id:"capture-openclaw",name:"Capture OpenClaw",reasoning:false,input:["text"],cost:{input:0,output:0,cacheRead:0,cacheWrite:0},contextWindow:128000,maxTokens:4096}]}}},tools:{profile:"coding"}}; fs.writeFileSync(process.env.OPENCLAW_CONFIG_PATH, JSON.stringify(config,null,2)+"\n")'
          openclaw agent \
            --local \
            --agent main \
            --message "Reply with the word captured." \
            --json

      - name: Capture Hermes Agent instructions
        working-directory: ${{ runner.temp }}/harness-sandbox
        env:
          HERMES_HOME: ${{ runner.temp }}/hermes-home
        run: |
          mkdir -p "$HERMES_HOME"
          printf '%s\n' \
            'model:' \
            '  default: "capture-hermes"' \
            '  provider: "custom"' \
            '  api_key: "local-capture-only"' \
            '  base_url: "http://127.0.0.1:8787/v1"' \
            > "$HERMES_HOME/config.yaml"
          hermes \
            --oneshot "Reply with the word captured." \
            --provider custom \
            --model capture-hermes \
            --ignore-rules

      - name: Record harness versions
        id: versions
        run: |
          echo "codex=$(codex --version)" >> "$GITHUB_OUTPUT"
          echo "claude_code=$(claude --version)" >> "$GITHUB_OUTPUT"
          echo "gemini_cli=$(gemini --version)" >> "$GITHUB_OUTPUT"
          echo "opencode=$(opencode --version)" >> "$GITHUB_OUTPUT"
          echo "kimi_cli=$(kimi --version)" >> "$GITHUB_OUTPUT"
          echo "qwen_code=$(qwen --version)" >> "$GITHUB_OUTPUT"
          echo "grok_code_cli=$(grok version)" >> "$GITHUB_OUTPUT"
          echo "pi=$(pi --version)" >> "$GITHUB_OUTPUT"
          echo "kilo_code_cli=$(kilo --version)" >> "$GITHUB_OUTPUT"
          echo "cline_cli=$(cline --version)" >> "$GITHUB_OUTPUT"
          CLINE_SDK_VERSION=$(node -p "require(process.env.RUNNER_TEMP + '/cline-sdk-runner/node_modules/@cline/sdk/package.json').version")
          echo "cline_sdk=$CLINE_SDK_VERSION" >> "$GITHUB_OUTPUT"
          echo "openclaw=$(openclaw --version)" >> "$GITHUB_OUTPUT"
          HERMES_VERSION=$(hermes --version)
          echo "hermes_agent=${HERMES_VERSION%%$'\n'*}" >> "$GITHUB_OUTPUT"

      - name: Prepare CLI capture artifact
        run: |
          mkdir -p "$RUNNER_TEMP/cli-captures/prompts"
          cp \
            prompts/codex.md \
            prompts/claude-code.md \
            prompts/gemini-cli.md \
            prompts/opencode.md \
            prompts/kimi-cli.md \
            prompts/qwen-code.md \
            prompts/grok-code-cli.md \
            prompts/pi.md \
            prompts/kilo-code-cli.md \
            prompts/cline-cli.md \
            prompts/cline-sdk.md \
            prompts/openclaw.md \
            prompts/hermes-agent.md \
            "$RUNNER_TEMP/cli-captures/prompts/"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-captures
          path: ${{ runner.temp }}/cli-captures
          if-no-files-found: error
          retention-days: 1

      - name: Show capture API log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/capture-api.log"

  capture-codex-desktop:
    runs-on: macos-latest
    timeout-minutes: 15
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - name: Download Codex Desktop
        run: |
          curl --fail --location --retry 3 \
            https://persistent.oaistatic.com/codex-app-prod/Codex.dmg \
            --output "$RUNNER_TEMP/Codex.dmg"
          mkdir -p "$RUNNER_TEMP/codex-dmg"
          hdiutil attach "$RUNNER_TEMP/Codex.dmg" \
            -nobrowse \
            -readonly \
            -mountpoint "$RUNNER_TEMP/codex-dmg"
          APP_PATH=$(find "$RUNNER_TEMP/codex-dmg" -maxdepth 1 -type d -name '*.app' -print -quit)
          test -n "$APP_PATH"
          echo "CODEX_DESKTOP_APP_PATH=$APP_PATH" >> "$GITHUB_ENV"

      - name: Start local capture API
        run: |
          bun run capture-api > "$RUNNER_TEMP/capture-api.log" 2>&1 &
          echo "CAPTURE_API_PID=$!" >> "$GITHUB_ENV"
          for attempt in {1..20}; do
            curl --fail --silent http://127.0.0.1:8787/health && exit 0
            sleep 0.25
          done
          cat "$RUNNER_TEMP/capture-api.log"
          exit 1

      - name: Create clean desktop sandbox
        run: |
          mkdir -p "$RUNNER_TEMP/desktop-sandbox"
          git -C "$RUNNER_TEMP/desktop-sandbox" init --initial-branch=main
          git -C "$RUNNER_TEMP/desktop-sandbox" config user.name "Harness Capture"
          git -C "$RUNNER_TEMP/desktop-sandbox" config user.email "harness-capture@localhost"

      - name: Capture Codex Desktop instructions
        env:
          CAPTURE_API_KEY: local-capture-only
          CAPTURE_WORKSPACE: ${{ runner.temp }}/desktop-sandbox
          CODEX_HOME: ${{ runner.temp }}/codex-desktop-home
        run: bun run capture-codex-desktop

      - name: Record Codex Desktop version
        id: version
        run: |
          APP_NAME=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleDisplayName' "$CODEX_DESKTOP_APP_PATH/Contents/Info.plist")
          APP_VERSION=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' "$CODEX_DESKTOP_APP_PATH/Contents/Info.plist")
          CODEX_VERSION=$("$CODEX_DESKTOP_APP_PATH/Contents/Resources/codex" --version)
          echo "version=$APP_NAME $APP_VERSION ($CODEX_VERSION)" >> "$GITHUB_OUTPUT"

      - name: Prepare desktop capture artifact
        run: |
          mkdir -p "$RUNNER_TEMP/desktop-captures/prompts"
          cp prompts/codex-desktop.md "$RUNNER_TEMP/desktop-captures/prompts/"

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-captures
          path: ${{ runner.temp }}/desktop-captures
          if-no-files-found: error
          retention-days: 1

      - name: Show capture API log on failure
        if: failure()
        run: cat "$RUNNER_TEMP/capture-api.log"

      - name: Detach Codex Desktop installer
        if: always()
        run: hdiutil detach "$RUNNER_TEMP/codex-dmg" || true

  publish:
    needs: [capture-cli, capture-codex-desktop]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install project dependencies
        run: bun install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          path: .
          merge-multiple: true

      - name: Validate snapshots
        env:
          REQUIRE_ALL_CAPTURES: "1"
          CODEX_VERSION: ${{ needs.capture-cli.outputs.codex_version }}
          CODEX_DESKTOP_VERSION: ${{ needs.capture-codex-desktop.outputs.version }}
          CLAUDE_CODE_VERSION: ${{ needs.capture-cli.outputs.claude_code_version }}
          CLINE_CLI_VERSION: ${{ needs.capture-cli.outputs.cline_cli_version }}
          CLINE_SDK_VERSION: ${{ needs.capture-cli.outputs.cline_sdk_version }}
          GEMINI_CLI_VERSION: ${{ needs.capture-cli.outputs.gemini_cli_version }}
          HERMES_AGENT_VERSION: ${{ needs.capture-cli.outputs.hermes_agent_version }}
          KILO_CODE_CLI_VERSION: ${{ needs.capture-cli.outputs.kilo_code_cli_version }}
          OPENCODE_VERSION: ${{ needs.capture-cli.outputs.opencode_version }}
          OPENCLAW_VERSION: ${{ needs.capture-cli.outputs.openclaw_version }}
          KIMI_CLI_VERSION: ${{ needs.capture-cli.outputs.kimi_cli_version }}
          QWEN_CODE_VERSION: ${{ needs.capture-cli.outputs.qwen_code_version }}
          GROK_CODE_CLI_VERSION: ${{ needs.capture-cli.outputs.grok_code_cli_version }}
          PI_VERSION: ${{ needs.capture-cli.outputs.pi_version }}
        run: |
          bun run metadata
          bun run readme
          bun test
          bun run typecheck
          test -s prompts/codex.md
          test -s prompts/codex-desktop.md
          test -s prompts/claude-code.md
          test -s prompts/cline-cli.md
          test -s prompts/cline-sdk.md
          test -s prompts/gemini-cli.md
          test -s prompts/hermes-agent.md
          test -s prompts/kilo-code-cli.md
          test -s prompts/opencode.md
          test -s prompts/openclaw.md
          test -s prompts/kimi-cli.md
          test -s prompts/qwen-code.md
          test -s prompts/grok-code-cli.md
          test -s prompts/pi.md

      - name: Commit changed snapshots
        run: |
          git add README.md prompts/*.md prompts/metadata.json
          if git diff --cached --quiet; then
            echo "Harness prompts are unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update harness system prompts"
          git push
